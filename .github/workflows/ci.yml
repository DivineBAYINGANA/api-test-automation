name: API Test Automation — CI/CD Pipeline

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:    

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: read
  checks: write        
  pull-requests: write 
  packages: write      # Required for GHCR

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  api-tests:
    name: Run API Tests (JUnit 5)
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Run tests
      - name: Run API tests
        id: run-tests
        run: |
          mvn test \
            -Dmaven.test.failure.ignore=true \
            --batch-mode \
            --no-transfer-progress

      # 5. Parse surefire XML and expose counts + failure details
      - name: Parse test results
        if: always()
        id: parse-results
        run: |
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; ERRORS=0

          for f in target/surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue
            t=$(grep  -oP 'tests="\K[0-9]+'    "$f" | head -1)
            fa=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
            sk=$(grep -oP 'skipped="\K[0-9]+'  "$f" | head -1)
            er=$(grep -oP 'errors="\K[0-9]+'   "$f" | head -1)
            TOTAL=$((TOTAL   + ${t:-0}))
            FAILED=$((FAILED  + ${fa:-0}))
            SKIPPED=$((SKIPPED + ${sk:-0}))
            ERRORS=$((ERRORS  + ${er:-0}))
          done

          PASSED=$((TOTAL - FAILED - SKIPPED - ERRORS))
          [ "$TOTAL" -gt 0 ] && PASS_PCT=$((PASSED * 100 / TOTAL)) || PASS_PCT=0

          # Build HTML rows for failed tests
          FAILURES_HTML=""
          for f in target/surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue
            while IFS='|' read -r cls nm msg; do
              FAILURES_HTML+="<tr>"
              FAILURES_HTML+="<td style='padding:8px 12px;border-bottom:1px solid #eee;font-family:monospace;font-size:12px;color:#b71c1c'>${cls}</td>"
              FAILURES_HTML+="<td style='padding:8px 12px;border-bottom:1px solid #eee;font-size:13px'>${nm}</td>"
              FAILURES_HTML+="<td style='padding:8px 12px;border-bottom:1px solid #eee;font-size:12px;color:#555'>${msg}</td>"
              FAILURES_HTML+="</tr>"
            done < <(python3 - "$f" <<'PYEOF'
          import sys, xml.etree.ElementTree as ET
          tree = ET.parse(sys.argv[1])
          for tc in tree.findall('.//testcase'):
              node = tc.find('failure') or tc.find('error')
              if node is None: continue
              msg = ((node.get('message') or node.text or '').strip())[:280]
              print(f"{tc.get('classname','')}|{tc.get('name','')}|{msg}")
          PYEOF
            )
          done

          echo "total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "passed=$PASSED"   >> $GITHUB_OUTPUT
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"   >> $GITHUB_OUTPUT
          echo "pass_pct=$PASS_PCT" >> $GITHUB_OUTPUT
          {
            echo "failures_html<<HTMLEOF"
            printf '%s' "$FAILURES_HTML"
            echo ""
            echo "HTMLEOF"
          } >> $GITHUB_OUTPUT

      # 6. Publish JUnit 5 test results as GitHub Check
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/**/*.xml
          check_name: "API Test Results"
          comment_on_pr: true
          fail_on: "test failures"

      # 7. Generate Allure Report
      - name: Generate Allure Report
        run: mvn allure:report
        if: always()

      # 8. Upload Allure Report as artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/

      # 9. Upload Surefire reports as downloadable artifact
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 14

      # 10. Email and Slack notifications (Python scripts omitted for brevity in summary, preserved in file)
      - name: Send email report
        if: always()
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:      ${{ secrets.REPORT_EMAIL }}
        run: |
          python3 << 'PYEOF'
          import os, smtplib, json, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          gmail_user = os.environ["GMAIL_ADDRESS"]
          gmail_pass = os.environ["GMAIL_APP_PASS"]
          report_to  = os.environ["REPORT_TO"]

          total    = "${{ steps.parse-results.outputs.total }}"    or "0"
          passed   = "${{ steps.parse-results.outputs.passed }}"   or "0"
          failed   = "${{ steps.parse-results.outputs.failed }}"   or "0"
          skipped  = "${{ steps.parse-results.outputs.skipped }}"  or "0"
          pass_pct = "${{ steps.parse-results.outputs.pass_pct }}" or "0"
          
          failing_tests = []
          for json_file in sorted(glob.glob("target/allure-results/*-result.json")):
              try:
                  with open(json_file, 'r', encoding='utf-8') as f:
                      data = json.load(f)
              except: continue
              if data.get("status") in ["failed", "broken"]:
                  labels = {l["name"]: l["value"] for l in data.get("labels", [])}
                  test_class = labels.get("testClass", "").split(".")[-1] or "Unknown"
                  steps_list = [f"{i}. {s.get('name', 'Step')}" for i, s in enumerate(data.get("steps", []), 1)]
                  steps_str = "<br>".join(steps_list) if steps_list else "1. See Allure report."
                  desc_raw = data.get("description", "No description provided.")
                  desc = desc_raw.split("**Impact:**")[0].strip().replace("\n", "<br>") if "**Impact:**" in desc_raw else desc_raw.replace("\n", "<br>")
                  impact = desc_raw.split("**Impact:**")[1].strip() if "**Impact:**" in desc_raw else "High: Attention required."
                  severity = labels.get("severity", "normal").capitalize()
                  msg = data.get("statusDetails", {}).get("message", "N/A")
                  failing_tests.append({"name": data.get("name"), "class": test_class, "desc": desc, "steps": steps_str, "impact": impact, "severity": severity, "message": msg})

          outcome = "${{ steps.run-tests.outcome }}"
          is_pass = (outcome == "success" and int(failed) == 0)
          status, s_icon, s_color, s_bg = ("PASSED", "✅", "#2e7d32", "#e8f5e9") if is_pass else ("FAILED", "❌", "#b71c1c", "#ffebee")
          next_steps = "All tests passed." if is_pass else "Action required."
          timestamp = datetime.now(timezone.utc).strftime("%d %B %Y at %H:%M UTC")
          
          fail_block = ""
          if failing_tests:
            fail_block = '<h2 style="color:#b71c1c">🚨 Detailed Failure Report</h2>'
            for t in failing_tests:
              fail_block += f'<div style="border:1px solid #ffcdd2; margin-bottom:20px; padding:16px;"><strong>{t["name"]}</strong><br>{t["message"]}</div>'

          html = f"""<html><body><h1>API Test Results: {status} {s_icon}</h1>{fail_block}</body></html>"""
          msg = MIMEMultipart("alternative"); msg["Subject"] = f"{s_icon} Run Result {status}"; msg.attach(MIMEText(html, "html"))
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(gmail_user, gmail_pass); server.sendmail(gmail_user, report_to, msg.as_string())
          PYEOF

      - name: Send Slack report
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys; from glob import glob
          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not webhook: sys.exit(0)
          total, passed, failed = "${{ steps.parse-results.outputs.total }}", "${{ steps.parse-results.outputs.passed }}", "${{ steps.parse-results.outputs.failed }}"
          is_pass = (int(failed) == 0); status_emoji = "✅" if is_pass else "❌"
          payload = {"text": f"{status_emoji} API Tests: {passed}/{total} passed"}
          subprocess.run(["curl", "-s", "-X", "POST", webhook, "-H", "Content-Type: application/json", "-d", json.dumps(payload)])
          PYEOF

      # 11. Fail the build if any tests actually failed
      - name: Fail build on test failures
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

  docker-build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main' && always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
